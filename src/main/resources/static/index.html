<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>数字人（H5）</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" type="image/x-icon" href="logo.png"/>
    <link rel="stylesheet" href="layui/css/layui.css">
    <link rel="stylesheet" href="layim/res/layim.css">
    <link rel="stylesheet" href="human/human.css">
</head>
<body>
<script src="human/fetch.event.source.js"></script>
<script src="human/audio.media.js"></script>
<script src="human/marked.min.js"></script>
<script src="layui/layui.js"></script>
<script>
    layui.config({
        base: 'human/',
        version: Date.now()
    }).extend({
        tts: '{/}human/baidu.tts',
        asr: '{/}human/baidu.asr'
    }).use(['human', 'tts', 'asr'], function () {

        const audioOptions = {sampleRate: 16000, sampleBits: 16, numberChannels: 1};
        const audioRecorder = new AudioRecorder(audioOptions);
        const audioPlayer = new AudioPlayer(audioOptions
            , function () {
                layui.human.speak();
            }
            , function () {
                this.onPause();
                layui.human.standby();
            });

        layui.human.init(layui.$('.human')[0], layui.$('canvas')[0], function () {
            layui.human.chat(`你好，我是${layui.human.me.title}。我可以如何帮到你？`, Date.now());
        });

        layui.human.models(function () {
            layui.dropdown.render({
                elem: '.layui-icon-set',
                data: [
                    {title: '场景', child: layui.human.scene},
                    {title: '形象', child: layui.human.human},
                    {title: '音库', child: layui.tts.sound},
                    {title: '模型', child: layui.human.model}
                ],
                click: function (data) {
                    if (audioPlayer.isPlaying) return layui.layer.msg('正在播放，请先暂停！');
                    layui.human.scene.forEach(function (value) {
                        if (data.title === value.title) {
                            layui.$('body').css('background', `url(${data.value}) no-repeat center center`);
                            layui.$('body').css('background-size', 'cover');
                        }
                    });
                    layui.human.human.forEach(function (value, index) {
                        if (data.title === value.title) {
                            layui.human.load(layui.human.human[index]);
                        }
                    });
                    layui.human.model.forEach(function (value, index) {
                        if (data.title === value.title) {
                            layui.human.request.model = layui.human.model[index].value;
                        }
                    });
                    layui.tts.sound.forEach(function (value, index) {
                        if (data.title === value.title) {
                            layui.tts.voice = layui.tts.sound[index].value;
                        }
                    });
                }
            });
        });

        layui.$('canvas').on('click', function () {
            if (audioPlayer.isPlaying) return layui.layer.msg('正在播放，请先暂停！');
            layui.human.chat(`你好，我是${layui.human.me.title}。我可以如何帮到你？`, Date.now());
            layui.tts.open(function (blob) {
                if (blob) return audioPlayer.onPush(blob);
                layui.tts.send(`你好，我是${layui.human.me.title}。我可以如何帮到你？`);
                layui.tts.stop();
            });
        });

        layui.$('.layui-icon-mike').on('click', function () {
            if (audioPlayer.isPlaying) return layui.layer.msg('正在播放，请先暂停！');
            const duration = 30;
            audioRecorder.open().then(function (stream) {
                console.log('开始录音...');
                const loading = layui.layer.load(2, {
                    time: 0, shade: 0.6, shadeClose: true,
                    content: '<span id="loading" style="font-weight:bold;color:white;' +
                        'position:absolute;left:-30px;width:150px;">录音中...<span>',
                    end: function () {
                        console.log('停止录音...');
                        const blob = audioRecorder.pcm();
                        layui.asr.asr(blob, function (text) {
                            if (!text || text === '') return layui.layer.msg('我没有听清你在说些什么！');
                            layui.$('.layui-input').val(text);
                            layui.$('.layui-icon-release').trigger('click');
                        });
                    }
                });
                audioRecorder.start(stream, function (params) {
                    console.log(params);
                    layui.$('#loading').html('录音中...（' + (duration - parseInt(params.duration)) + '秒）<br>按下发送');
                    if (params.duration > duration) layui.layer.close(loading);
                });
            }, function (error) {
                layui.layer.msg(`麦克风打开失败！（${error.name}:${error.message}）`);
            });
        });

        layui.$('.layui-icon-release').on('click', function () {
            if (layui.$('.layui-input').val() === '') return layui.$('.layui-input').focus();
            if (audioPlayer.isPlaying) return layui.layer.msg('正在播放，请先暂停！');
            layui.human.chat(layui.$('.layui-input').val());
            layui.tts.open(function (buffer) {
                if (buffer) return audioPlayer.onPush(buffer);
                const messages = [], uuid = Date.now() + 1000;
                layui.human.send(layui.$('.layui-input').val(), function (done, text) {
                    if (done) layui.tts.stop();
                    if (layui.$.trim(text)) {
                        messages.push(text)
                        layui.tts.send(text);
                        layui.human.chat(marked.parse(messages.join('')), uuid);
                    }
                });
                layui.$('.layui-input').val('');
            });
        });

        layui.$('.layui-icon-pause').on('click', function () {
            layui.human.sse.close();
            layui.tts.close();
            audioPlayer.onDone();
        });

        layui.$('.layui-input').on('keyup', function (e) {
            if (e.keyCode === 13) layui.$('.layui-icon-release').trigger('click');
        });

        layui.form.on('checkbox(chat-tools-switch)', function (data) {
            if (data.elem.name === 'enable-thinking') {
                layui.human.request.enable_thinking = data.elem.checked;
                layui.human.request.thinking.type = data.elem.checked ? 'enabled' : 'disabled';
            }
            if (data.elem.name === 'enable-search') {
                layui.human.request.enable_search = data.elem.checked;
                layui.human.request.web_search.enable = data.elem.checked;
            }
        });

    });
</script>
<div class="container">
    <div class="header">
        <div class="header-left layui-form">
            <label for="enable-thinking"></label>
            <input type="checkbox" name="enable-thinking" lay-skin="none" lay-filter="chat-tools-switch">
            <div lay-checkbox class="chat-tools-skin layui-badge">
                <i class="layui-icon layui-icon-component"></i>深度思考
            </div>
            <label for="enable-search"></label>
            <input type="checkbox" name="enable-search" lay-skin="none" lay-filter="chat-tools-switch">
            <div lay-checkbox class="chat-tools-skin layui-badge">
                <i class="layui-icon layui-icon-website"></i>联网搜索
            </div>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <a href="javascript:" class="layui-icon layui-icon-pause" style="font-size: 30px;color: black;"></a>
            <a href="javascript:" class="layui-icon layui-icon-set" style="font-size: 30px;color: black;"></a>
        </div>
    </div>
    <div class="main">
        <div class="human">
            <div class="layim-chat-main layim-scrollbar">
                <ul></ul>
            </div>
            <canvas></canvas>
        </div>
    </div>
    <div class="footer">
        <div class="footer-left">
            <a href="javascript:" class="layui-icon layui-icon-mike" style="font-size: 30px;color: black;"></a>
        </div>
        <div class="footer-center">
            <label><input type="text" class="layui-input" placeholder="你可以问我任何问题..."></label>
        </div>
        <div class="footer-right">
            <a href="javascript:" class="layui-icon layui-icon-release" style="font-size: 30px;color: black;"></a>
        </div>
    </div>
</div>
</body>
</html>
