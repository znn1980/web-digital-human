<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>AI智能酒店（演示）</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" type="image/x-icon" href="hotel.png"/>
    <link rel="stylesheet" href="../layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../layim/res/layim.css" media="all">
    <link rel="stylesheet" href="hotel.css" media="all">
</head>
<body>
<div id="all-map"></div>
<div id="all-hotels">
    <table id="all-hotels-table" class="layui-table" lay-options="{size:'sm',skin:'row'}">
        <thead>
        <tr>
            <th lay-options="{field:'name',width:120,templet:'<div><span title=\'{{= d.address }}\'>{{= d.name }}</span></div>'}">酒店</th>
            <th lay-options="{field:'type',width:60}">类型</th>
            <th lay-options="{field:'price',width:80}">参考价</th>
        </tr>
        </thead>
    </table>
</div>
<script src="https://api.map.baidu.com/api?v=1.0&type=webgl&ak=vlArPed8Ipa6Im77cbpq9Flok1BSJd18"></script>
<script src="../human/fetch.event.source.js"></script>
<script src="../human/markdown-it.min.js"></script>
<script src="../human/web-speech-api.js"></script>
<script src="../layui/layui.js"></script>
<script src="hotel.js"></script>
<script>
    layui.config({
        layimPath: '../layim/',
        layimResPath: '../layim/res/'
    }).extend({
        layim: layui.cache.layimPath + 'layim'
    }).use(['layim'], function () {

        const webSpeech = new WebSpeech();
        let abortController
            , conversationId = asUuid()
            , periodThinking = 0
            , enableThinking = false
            , enableSearch = false;

        layui.form.on('checkbox(chat-tools-switch)', function (data) {
            if (data.elem.name === 'enable-thinking') {
                enableThinking = data.elem.checked;
            }
            if (data.elem.name === 'enable-search') {
                enableSearch = data.elem.checked;
            }
            if (data.elem.name === 'mike') {
                webSpeech.listen(function (result) {
                    console.log('语音识别 => ', result);
                    if (layui.$.trim(result) === '') {
                        return layui.layer.msg('未识别到文字');
                    }
                    layui.layim.sendMessage(result);
                }, function () {
                    data.elem.checked = false;
                });
            }
        });

        layui.layim.on('chatInit', function (data) {
            layui.$(data.elem).find('.layim-chat-tool').empty().html(`
                <span class="layui-form">
                  <input ${enableThinking ? 'checked' : ''} type="checkbox"
                   name="enable-thinking" value="深度思考" lay-skin="none" lay-filter="chat-tools-switch">
                  <div lay-checkbox class="chat-tools-skin layui-badge">
                    <i class="layui-icon layui-icon-component"></i>深度思考
                  </div>
                  <input ${enableSearch ? 'checked' : ''} type="checkbox"
                   name="enable-search" value="联网搜索" lay-skin="none" lay-filter="chat-tools-switch">
                  <div lay-checkbox class="chat-tools-skin layui-badge">
                    <i class="layui-icon layui-icon-website"></i>联网搜索
                  </div>
                  <input type="checkbox" name="mike" lay-skin="none" lay-filter="chat-tools-switch">
                  <div lay-checkbox class="chat-tools-skin layui-badge">
                    <i class="layui-icon layui-icon-mike"></i>语音输入
                  </div>
                </span>
            `);
            layui.form.render();
            layui.layim.getMessage({
                system: true
                , id: data.data.id
                , type: data.data.type
                , content: '以下为新的对话'
                , saveLocalChatlog: false
            });
            layui.$.ajax({url: `../ai/chat/${conversationId}`, type: 'DELETE'});
            conversationId = asUuid();
        });

        layui.layim.on('sendMessage', function (data) {
            console.log('sendMessage => ', data);
            const user = data.user, receiver = data.receiver;
            if (receiver.type === 'ai') {
                let thinking = false, content = [];
                abortController = new AbortController();
                SSE.fetchEventSource(`../ai/chat/completions`, {
                    method: 'POST'
                    , headers: {'Content-Type': 'application/json'}
                    , body: JSON.stringify({
                        uuid: conversationId, system: null, user: user.content
                        , enableThinking: enableThinking, enableSearch: enableSearch
                    })
                    , signal: abortController.signal
                    , onopen: function (response) {
                        if (!response.ok) throw new Error(`URL ${response.status} ${response.statusText}`);
                    }
                    , onmessage: function (msg) {
                        console.log('msg => ', msg);
                        const data = JSON.parse(msg.data);
                        const reasoningContent = data?.result?.output?.metadata?.reasoningContent;
                        const text = data?.result?.output?.text;
                        if (layui.$.trim(reasoningContent)) {
                            if (thinking === false) {
                                thinking = true;
                                periodThinking = Date.now();
                                content.push('<think>');
                            }
                            content.push(reasoningContent);
                        }
                        if (layui.$.trim(text)) {
                            if (thinking === true) {
                                thinking = false;
                                periodThinking = Date.now() - periodThinking;
                                content.push('</think>');
                            }
                            content.push(text);
                        }
                        if (layui.$.trim(content.join(''))) {
                            layui.layim.getMessage({...receiver, content: `${content.join('')} _`, finished: false});
                        }
                    }
                    , onerror: function (error) {
                        layui.layim.getMessage({...receiver, content: `**错误信息：** ${error}`, finished: true});
                        throw error;
                    }
                    , onclose: function () {
                        layui.layim.getMessage({...receiver, content: content.join(''), finished: true});
                    }
                });
            }
        });

        const md = markdownit({typographer: true, linkify: true, breaks: true});
        layui.layim.callback('contentParser', function (data) {
            return md.render(data).replaceAll('<table>', '<table class="layui-table" lay-size="sm">')
                .replaceAll(layui.util.escape('<think>'), `
                  <div class="layui-timeline">
                    <div class="layui-timeline-item">
                      <i class="layui-icon layui-timeline-axis layui-icon-component"></i>
                      <div class="layui-timeline-content layui-text">
                        <h6 class="layui-timeline-title">深度思考</h6>
                `)
                .replaceAll(layui.util.escape('</think>'), `
                      </div>
                    </div>
                    <div class="layui-timeline-item">
                      <i class="layui-icon layui-timeline-axis layui-icon-component"></i>
                      <div class="layui-timeline-content layui-text">
                        <h6 class="layui-timeline-title">已思考（用时${(periodThinking / 1000).toFixed(2)}秒）</h6>
                      </div>
                    </div>
                  </div>
                `);
        });

        layui.$.get('hotel.json').done(function (data) {
            allMap.centerAndZoom(new BMapGL.Point(data.point.lng, data.point.lat), 11);
            allMap.enableScrollWheelZoom();
            addMarker(data);

            document.title = `${data.name}`;
            layui.layim.config({
                contactsPanel: false
                , init: {
                    user: {
                        id: `user-${data.name}`
                        , username: data.name
                        , avatar: 'hotel.png'
                    }
                }
            });

            layui.util.fixbar({
                default: false
                , bars: [{icon: 'layui-icon-bot', style: 'background-color: #FF5722;'}]
                , on: {
                    click: function () {
                        layui.layim.chat({
                            type: 'ai'
                            , id: `ai-${data.name}`
                            , username: `${data.name}（AI助手）`
                            , avatar: 'robot.png'
                            , new: true
                            , enableLocalChatlog: false
                            , layer: {
                                end: function () {
                                    if (abortController) abortController.abort();
                                    webSpeech.cancel();
                                    layui.$.ajax({url: `../ai/chat/${conversationId}`, type: 'DELETE'});
                                }
                            }
                        });
                    }
                }
            });

            layui.$.get('hotels.json').done(function (data) {
                addHotels(data);
                layui.table.reload('all-hotels-table', {data: data});
                setInterval(function () {
                    addHotels(data);
                    layui.table.reload('all-hotels-table', {data: data});
                }, 1000 * 30);
            });
        });

    });
</script>
</body>
</html>
